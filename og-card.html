<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{
    --bg:#0B1020; --bg2:#0E1428; --surface:#151B30; --line:#26304F;
    --text:#EAECF5; --muted:#98A0B8;
    --amber:#F2A65A; --green:#5FD08A; --magenta:#E0619E; --cyan:#58C6E0; --slate:#8A97FF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px}
  body{
    background:
      radial-gradient(1100px 700px at 50% -18%, #1a2650 0%, rgba(22,32,63,0) 62%),
      linear-gradient(180deg,var(--bg2),var(--bg));
    color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;justify-content:center;
    padding:0 96px;position:relative;overflow:hidden;
  }
  .mark{display:flex;gap:7px;align-items:center;margin-bottom:34px}
  .mark span{width:18px;height:74px;border-radius:6px;display:block}
  .mark span:nth-child(1){background:var(--amber)}
  .mark span:nth-child(2){background:var(--magenta)}
  .mark span:nth-child(3){background:var(--cyan)}
  h1{font-size:82px;font-weight:660;letter-spacing:-0.025em;line-height:1.02}
  .rule{
    width:150px;height:7px;border-radius:7px;margin:30px 0 26px;
    background:linear-gradient(90deg,var(--amber),var(--magenta),var(--cyan));
  }
  .tag{font-size:33px;color:var(--muted);letter-spacing:0.005em;max-width:900px;line-height:1.3}
  .values{display:flex;gap:14px;margin-top:44px}
  .vchip{
    font-size:24px;font-weight:600;letter-spacing:0.02em;
    color:var(--text);background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:13px 24px 13px 20px;
    display:inline-flex;align-items:center;gap:12px;
  }
  .vchip i{width:13px;height:13px;border-radius:50%;display:block}
  .foot{position:absolute;right:96px;bottom:60px;font-size:22px;color:var(--muted);letter-spacing:0.04em}
</style>
</head>
<body>
  <div class="mark"><span></span><span></span><span></span></div>
  <h1>Noah Jefferson</h1>
  <div class="rule"></div>
  <p class="tag">Photography, and small free tools for enjoying the world.</p>
  <div class="values">
    <span class="vchip"><i style="background:#F2A65A"></i>Free</span>
    <span class="vchip"><i style="background:#5FD08A"></i>No account</span>
    <span class="vchip"><i style="background:#58C6E0"></i>No install</span>
    <span class="vchip"><i style="background:#E0619E"></i>Works offline</span>
  </div>
  <div class="foot">noahjefferson.pages.dev</div>
</body>
</html>
