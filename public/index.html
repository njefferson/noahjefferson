<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Noah Jefferson — photography & free tools</title>

<!-- discovery + share tiles ---------------------------------------------- -->
<meta name="description" content="Photography and free, no-account tools by Noah Jefferson — birds, infrared and macro, plus small web apps for enjoying the world. No sign-up, no install, works offline.">
<meta name="theme-color" content="#0B1020">
<link rel="canonical" href="https://noahjefferson.pages.dev/">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="%230B1020"/><rect x="6" y="5" width="3" height="14" rx="1.5" fill="%23F2A65A"/><rect x="10.5" y="5" width="3" height="14" rx="1.5" fill="%23E0619E"/><rect x="15" y="5" width="3" height="14" rx="1.5" fill="%2358C6E0"/></svg>'>

<!-- Open Graph (Facebook / iMessage / WhatsApp / Slack / Discord) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Noah Jefferson">
<meta property="og:title" content="Noah Jefferson — photography & free tools">
<meta property="og:description" content="Birds, infrared & macro photography, plus free no-account web apps for enjoying the world.">
<meta property="og:url" content="https://noahjefferson.pages.dev/">
<meta property="og:image" content="https://noahjefferson.pages.dev/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Noah Jefferson — photography and free tools. Free, no account, no install, works offline.">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Noah Jefferson — photography & free tools">
<meta name="twitter:description" content="Birds, infrared & macro photography, plus free no-account web apps for enjoying the world.">
<meta name="twitter:image" content="https://noahjefferson.pages.dev/og.png">
<meta name="twitter:image:alt" content="Noah Jefferson — photography and free tools.">

<style>
  :root{
    --bg:#0B1020;
    --bg2:#0E1428;
    --surface:#151B30;
    --surface-hi:#1B2340;
    --line:#26304F;
    --text:#EAECF5;
    --muted:#8B93AD;
    /* false-color spectral accents */
    --amber:#F2A65A;
    --green:#5FD08A;
    --magenta:#E0619E;
    --cyan:#58C6E0;
    --slate:#8A97FF;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #16203f 0%, rgba(22,32,63,0) 60%),
      linear-gradient(180deg,var(--bg2),var(--bg));
    color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100dvh;
    padding:48px 20px 64px;
  }
  .wrap{max-width:560px;margin:0 auto}

  /* header */
  .head{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;margin-bottom:34px}
  .mark{display:flex;gap:3px;align-items:center}
  .mark span{width:8px;height:34px;border-radius:3px;display:block}
  .mark span:nth-child(1){background:var(--amber)}
  .mark span:nth-child(2){background:var(--magenta)}
  .mark span:nth-child(3){background:var(--cyan)}
  .name{font-size:27px;font-weight:650;letter-spacing:-0.02em;margin:0}
  .rule{
    width:64px;height:3px;border-radius:3px;
    background:linear-gradient(90deg,var(--amber),var(--magenta),var(--cyan));
    background-size:200% 100%;
    animation:drift 6s linear infinite;
  }
  .tag{margin:0;color:var(--muted);font-size:14.5px;letter-spacing:0.01em}
  @keyframes drift{to{background-position:200% 0}}

  /* values strip */
  .values{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-top:2px}
  .vchip{
    font-size:11px;font-weight:600;letter-spacing:0.05em;
    color:var(--text);background:var(--surface);
    border:1px solid var(--line);border-radius:999px;padding:5px 11px 5px 9px;
    display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
  }
  .vchip::before{
    content:"";width:6px;height:6px;border-radius:50%;
    background:var(--band,var(--slate));flex:0 0 auto;
  }

  /* groups */
  .group{margin-top:30px}
  .group-title{
    font-size:11.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--muted);margin:0 0 12px 4px;
  }
  .tiles{display:flex;flex-direction:column;gap:11px}

  /* link tile (Instagram rows) */
  .tile{
    position:relative;display:flex;align-items:center;gap:14px;
    padding:15px 16px 15px 14px;border-radius:15px;
    background:var(--surface);border:1px solid var(--line);
    color:var(--text);text-decoration:none;overflow:hidden;
    transition:transform .16s ease, background .16s ease, border-color .16s ease;
  }
  .tile::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--band,var(--slate));
  }
  a.tile:hover{transform:translateY(-2px);background:var(--surface-hi);border-color:#33406b}
  a.tile:focus-visible{outline:2px solid var(--band,var(--slate));outline-offset:2px}

  .ico{
    flex:0 0 40px;height:40px;border-radius:11px;display:grid;place-items:center;
    color:var(--band,var(--slate));
    background:color-mix(in srgb, var(--band,var(--slate)) 15%, transparent);
    border:1px solid color-mix(in srgb, var(--band,var(--slate)) 35%, transparent);
  }
  .ico svg{width:21px;height:21px}
  .txt{min-width:0;flex:1}
  .label{display:block;font-size:15.5px;font-weight:600;letter-spacing:-0.01em;line-height:1.2}
  .sub{display:block;font-size:13px;color:var(--muted);margin-top:3px;line-height:1.2}
  .arrow{color:var(--muted);opacity:0;transform:translateX(-3px);transition:opacity .16s ease, transform .16s ease}
  a.tile:hover .arrow{opacity:1;transform:translateX(0)}

  /* app card — shows the app's own social tile as the hero image */
  .appcard{
    position:relative;display:block;border-radius:16px;overflow:hidden;
    background:var(--surface);border:1px solid var(--line);
    color:var(--text);text-decoration:none;
    transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  .appcard::before{
    content:"";position:absolute;left:0;right:0;top:0;height:3px;z-index:2;
    background:var(--band,var(--slate));
  }
  a.appcard:hover{transform:translateY(-3px);border-color:#33406b;box-shadow:0 12px 30px rgba(0,0,0,.38)}
  a.appcard:focus-visible{outline:2px solid var(--band,var(--slate));outline-offset:2px}
  .appcard .shot{
    display:block;width:100%;height:auto;aspect-ratio:1200/630;object-fit:cover;
    background:#0a0f1e;border-bottom:1px solid var(--line);
  }
  .appcard .meta{display:flex;align-items:center;gap:12px;padding:13px 15px 14px}
  .appcard .app-name{display:block;font-size:15.5px;font-weight:650;letter-spacing:-0.01em;line-height:1.2}
  .appcard .app-sub{display:block;font-size:13px;color:var(--muted);margin-top:3px;line-height:1.3}
  .appcard .go{
    flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;
    font-size:12.5px;font-weight:650;letter-spacing:0.01em;color:var(--band,var(--slate));
  }
  .appcard .go svg{width:15px;height:15px}

  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:40px;letter-spacing:0.01em;line-height:1.5}

  @media (prefers-reduced-motion:reduce){
    .rule{animation:none}
    a.tile,a.appcard{transition:none}
    a.tile:hover,a.appcard:hover{transform:none}
  }
</style>
</head>
<body>
  <main class="wrap">
    <header class="head">
      <div class="mark" aria-hidden="true"><span></span><span></span><span></span></div>
      <h1 class="name" id="name"></h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="tag" id="tag"></p>
      <div class="values" id="values" aria-label="What these are"></div>
    </header>
    <div id="groups"></div>
    <p class="foot" id="foot"></p>
  </main>

<script>
/* =========================================================================
   EDIT HERE.
   Two kinds of section (set by "kind"):
     kind:"links" -> Instagram-style rows (icon + name + sub). Empty url = "Soon".
     kind:"apps"  -> big cards that show each app's own social tile image.
                     "shot" is the image path under public/tiles/.
   band: "amber" | "green" | "magenta" | "cyan" | "slate"
   ========================================================================= */

const PROFILE = {
  name: "Noah Jefferson",
  tag:  "Photography, and small free tools for enjoying the world.",
  foot: "No paywall, no sign-up — free, and yours to keep.\nMade by Noah Jefferson."
};

/* the promises every one of these keeps (shown as chips under the name) */
const VALUES = [
  { t: "Free",          band: "amber"   },
  { t: "No account",    band: "green"   },
  { t: "No install",    band: "cyan"    },
  { t: "Works offline", band: "magenta" },
];

const GROUPS = [
  {
    title: "Photography",
    kind: "links",
    tiles: [
      { label: "@noah.jefferson.photo",    sub: "Birds & wildlife — main",  url: "https://instagram.com/noah.jefferson.photo",    type:"ig", band:"amber"   },
      { label: "@noah.jefferson.infrared", sub: "Infrared / false color",   url: "https://instagram.com/noah.jefferson.infrared", type:"ig", band:"magenta" },
      { label: "@noah.jefferson.macro",    sub: "Macro",                    url: "https://instagram.com/noah.jefferson.macro",    type:"ig", band:"green"   },
    ]
  },
  {
    title: "Free web apps",
    kind: "apps",
    tiles: [
      {
        name: "Photo Studio", sub: "Infrared editing & focus stacking, in your browser",
        url: "https://jefferson-photo-studio.pages.dev",
        shot: "tiles/photo-studio.jpg", band: "magenta",
        alt: "Photo Studio — a free in-browser infrared photo editor and focus-stacker (shown: a false-color infrared forest)."
      },
      {
        name: "Frame", sub: "Where & when to photograph which birds",
        url: "https://bird-location-scouting.pages.dev",
        shot: "tiles/frame.png", band: "amber",
        alt: "Frame — a free app for where to go, in which month, to photograph which birds."
      },
      {
        name: "Photo Pointer", sub: "A map of every place worth shooting",
        url: "https://photo-pointer.pages.dev",
        shot: "tiles/photo-pointer.png", band: "cyan",
        alt: "Photo Pointer — a map of every photo-worthy place in your region: viewpoints, markers, parks, trails, wildlife, dark skies."
      },
    ]
  }
];

/* ---- render (no need to edit below) ---- */
const ICONS = {
  ig:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1.15" fill="currentColor" stroke="none"/></svg>`,
  app:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg>`
};
const ARROW    = `<svg class="arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M7 17L17 7M9 7h8v8"/></svg>`;
const ARROW_GO = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M7 17L17 7M9 7h8v8"/></svg>`;

/* Instagram-style row */
function tile(t){
  const inner =
    `<span class="ico" aria-hidden="true">${ICONS[t.type]||ICONS.app}</span>`+
    `<span class="txt"><span class="label">${t.label}</span><span class="sub">${t.sub}</span></span>`;
  if(t.url){
    const a=document.createElement("a");
    a.className="tile"; a.href=t.url; a.target="_blank"; a.rel="noopener";
    a.style.setProperty("--band",`var(--${t.band})`);
    a.innerHTML=inner+ARROW;
    return a;
  }
  const d=document.createElement("div");
  d.className="tile soon";
  d.style.setProperty("--band",`var(--${t.band})`);
  d.innerHTML=inner+`<span class="chip">Soon</span>`;
  return d;
}

/* App card with its social tile as the hero image */
function appCard(a){
  const el=document.createElement("a");
  el.className="appcard"; el.href=a.url; el.target="_blank"; el.rel="noopener";
  el.style.setProperty("--band",`var(--${a.band})`);
  el.innerHTML=
    `<img class="shot" src="${a.shot}" alt="${a.alt}" loading="lazy">`+
    `<div class="meta"><span class="txt">`+
      `<span class="app-name">${a.name}</span>`+
      `<span class="app-sub">${a.sub}</span>`+
    `</span><span class="go">Open ${ARROW_GO}</span></div>`;
  return el;
}

document.getElementById("name").textContent=PROFILE.name;
document.getElementById("tag").textContent=PROFILE.tag;
document.getElementById("foot").textContent=PROFILE.foot;

const vhost=document.getElementById("values");
VALUES.forEach(v=>{
  const s=document.createElement("span");
  s.className="vchip";
  s.style.setProperty("--band",`var(--${v.band})`);
  s.textContent=v.t;
  vhost.appendChild(s);
});

const host=document.getElementById("groups");
GROUPS.forEach(g=>{
  const sec=document.createElement("section"); sec.className="group";
  const h=document.createElement("h2"); h.className="group-title"; h.textContent=g.title;
  const list=document.createElement("div"); list.className="tiles";
  g.tiles.forEach(t=>list.appendChild(g.kind==="apps" ? appCard(t) : tile(t)));
  sec.appendChild(h); sec.appendChild(list); host.appendChild(sec);
});
</script>
</body>
</html>
