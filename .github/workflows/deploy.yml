name: Deploy

# main -> production (noahjefferson.pages.dev)
# Deploys the static site in public/ to Cloudflare Pages via wrangler.
# Needs two repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare Cloudflare credentials
        id: cf
        env:
          RAW_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Strip any whitespace/newlines that sneak in when a secret is pasted.
          # A trailing newline corrupts the Authorization header (Cloudflare 6111).
          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')
          ACCOUNT=$(printf '%s' "$RAW_ACCOUNT" | tr -d '[:space:]')
          echo "::add-mask::$TOKEN"
          echo "::add-mask::$ACCOUNT"
          if [ -n "$TOKEN" ] && [ -n "$ACCOUNT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets not configured yet - skipping deploy."
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "account=$ACCOUNT" >> "$GITHUB_OUTPUT"

      - name: Verify cleaned token
        if: steps.cf.outputs.ready == 'true'
        continue-on-error: true
        env:
          TOKEN: ${{ steps.cf.outputs.token }}
        run: |
          echo "cleaned token length: ${#TOKEN}"
          curl -s https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('valid:', d.get('success'), '| status:', (d.get('result') or {}).get('status'), '| errors:', d.get('errors'))"

      - name: Ensure Pages project exists
        if: steps.cf.outputs.ready == 'true'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ steps.cf.outputs.token }}
          accountId: ${{ steps.cf.outputs.account }}
          command: pages project create noahjefferson --production-branch=main

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ steps.cf.outputs.token }}
          accountId: ${{ steps.cf.outputs.account }}
          command: pages deploy public --project-name=noahjefferson --branch=${{ github.ref_name }} --commit-dirty=true
