name: Deploy

# main -> production (noahjefferson.pages.dev)
# Deploys the static site in public/ to Cloudflare Pages via wrangler.
# Needs two repo secrets:
#   CLOUDFLARE_API_TOKEN   (an account-wide "Cloudflare Pages: Edit" token)
#   CLOUDFLARE_ACCOUNT_ID  (same value your other apps use)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check Cloudflare secrets
        id: cf
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$ACCOUNT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets not configured yet - skipping deploy."
          fi

      # TEMPORARY diagnostic — reports WHY auth fails without printing secrets.
      - name: Diagnose Cloudflare auth
        if: steps.cf.outputs.ready == 'true'
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "token length: ${#TOKEN} (a valid Cloudflare token is 40 chars)"
          echo "account-id length: ${#ACCOUNT} (a valid account id is 32 hex chars)"
          echo "== 1. is the token itself valid? =="
          curl -s https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('  valid:', d.get('success'), '| status:', (d.get('result') or {}).get('status'), '| errors:', d.get('errors'))"
          echo "== 2. which accounts can this token see? (compare count to what you expect) =="
          curl -s https://api.cloudflare.com/client/v4/accounts \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result') or []; print('  success:', d.get('success'), '| account count:', len(r), '| names:', [a.get('name') for a in r], '| errors:', d.get('errors'))"
          echo "== 3. can it list Pages projects for the given account id? =="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT/pages/projects" \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('  success:', d.get('success'), '| errors:', d.get('errors'))"

      - name: Ensure Pages project exists
        if: steps.cf.outputs.ready == 'true'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create noahjefferson --production-branch=main

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=noahjefferson --branch=${{ github.ref_name }} --commit-dirty=true
